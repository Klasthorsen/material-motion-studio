<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Material Motion Studio</title>
    <link rel="stylesheet" href="./studio/styles.css">
  </head>
  <body>
    <div class="studio-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <button class="icon-button" id="toggleSidebar" aria-label="Toggle component list">☰</button>
          <div class="sidebar-title-wrap">
            <div class="eyebrow">Material Motion Studio</div>
            <h1 class="sidebar-title">Components</h1>
          </div>
        </div>

        <div class="sidebar-actions">
          <button id="newComponent" class="primary">New</button>
          <button id="importJson">Import JSON</button>
        </div>

        <div class="component-list" id="componentList"></div>
      </aside>

      <main class="stage-area">
        <header class="stage-header">
          <div>
            <div class="eyebrow">Focused Component</div>
            <h2 id="componentTitle">Conversion KPI card</h2>
          </div>

          <div class="breakpoint-switcher" id="breakpointSwitcher">
            <button data-breakpoint="mobile" class="active">Mobile</button>
            <button data-breakpoint="tablet">Tablet</button>
            <button data-breakpoint="desktop">Desktop</button>
          </div>
        </header>

        <section class="stage-canvas">
          <div class="device-stage mobile" id="deviceStage">
            <div class="device-label" id="deviceLabel">Mobile preview</div>
            <div class="device-frame">
              <div class="component-preview" id="componentPreview"></div>
            </div>
          </div>
        </section>
      </main>

      <aside class="inspector">
        <section class="inspector-section">
          <div class="eyebrow">Component</div>
          <label for="componentName">Name</label>
          <input id="componentName" type="text" placeholder="Conversion KPI card">

          <label for="componentType">Type</label>
          <select id="componentType">
            <option value="metric-card">Metric card</option>
            <option value="chart-panel">Chart panel</option>
            <option value="tab-panel">Tab panel</option>
            <option value="filter-group">Filter group</option>
            <option value="list-row">List row</option>
            <option value="dialog-sheet">Dialog or sheet</option>
          </select>

          <label for="figmaUrl">Figma frame</label>
          <input id="figmaUrl" type="text" placeholder="https://www.figma.com/design/...">

          <label for="sourceImage">Upload image</label>
          <input id="sourceImage" type="file" accept="image/*">

          <label for="prompt">Prompt</label>
          <textarea id="prompt" rows="4" placeholder="Describe the desired motion tone and what changes between states."></textarea>
        </section>

        <section class="inspector-section">
          <div class="section-head">
            <div class="eyebrow">Motion</div>
            <button id="recommendMotion" class="ghost small">Recommend</button>
          </div>

          <label for="preset">Pattern</label>
          <select id="preset">
            <option value="container-transform">Container transform</option>
            <option value="shared-axis-x">Shared axis X</option>
            <option value="shared-axis-z">Shared axis Z</option>
            <option value="fade-through">Fade through</option>
            <option value="fade">Fade</option>
            <option value="micro-interaction">Micro interaction</option>
          </select>

          <label for="duration">Duration <span id="durationValue">300 ms</span></label>
          <input id="duration" type="range" min="120" max="450" step="5" value="300">

          <label for="easing">Easing</label>
          <select id="easing">
            <option value="cubic-bezier(0.4, 0, 0.2, 1)">Standard</option>
            <option value="cubic-bezier(0, 0, 0.2, 1)">Enter</option>
            <option value="cubic-bezier(0.4, 0, 1, 1)">Exit</option>
            <option value="cubic-bezier(0.4, 0, 0.6, 1)">Sharp</option>
          </select>

          <label for="distance">Move <span id="distanceValue">32 px</span></label>
          <input id="distance" type="range" min="0" max="72" step="2" value="32">

          <label for="scale">Scale <span id="scaleValue">0.94</span></label>
          <input id="scale" type="range" min="0.85" max="1" step="0.01" value="0.94">

          <label for="opacity">Opacity start <span id="opacityValue">0.00</span></label>
          <input id="opacity" type="range" min="0" max="1" step="0.05" value="0">

          <label for="stagger">Stagger <span id="staggerValue">30 ms</span></label>
          <input id="stagger" type="range" min="0" max="80" step="5" value="30">
        </section>

        <section class="inspector-section">
          <div class="eyebrow">Rationale</div>
          <ul class="guidance-list" id="guidanceList"></ul>
        </section>

        <div class="inspector-actions">
          <button id="saveComponent" class="primary">Save</button>
          <button id="duplicateComponent">Duplicate</button>
        </div>
      </aside>
    </div>

    <script src="./studio/app.js"></script>
  </body>
</html>
